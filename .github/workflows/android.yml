name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v5

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Find project folder
        id: find
        run: |
          DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "Found project in $DIR"

      - name: Install packages
        working-directory: ${{ steps.find.outputs.dir }}
        run: npm install

      - name: Build website
        working-directory: ${{ steps.find.outputs.dir }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Create Android project
        working-directory: ${{ steps.find.outputs.dir }}
        run: |
          npx cap add android
          npx cap sync android

      - name: Fix permissions
        working-directory: ${{ steps.find.outputs.dir }}
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: ${{ steps.find.outputs.dir }}/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FinanceTracker-APK
          path: ${{ steps.find.outputs.dir }}/android/app/build/outputs/apk/debug/app-debug.apk
